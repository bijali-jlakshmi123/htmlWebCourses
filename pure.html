<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Pure Function Example</title>
  </head>
  <body>
    <h1>Open Console (F12)</h1>

    <script>
      function sum(a, b) {
        let tot = a + b;
        console.log(tot);
      }
      sum(2, 3);
    </script>
