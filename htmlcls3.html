//array destructuring //object destructuring

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let obj1 = {
        state: "Kerala",
        language: "Malayalam",
        population: 10000,

        airports: {
          a1: "TVM",
          a2: "COK",
          a3: "CCJ",
          a4: "CNN",
        },
      };

      /*let state = obj1.state;
      let language = obj1.language;
      let population = obj1.population;
      console.log(state);
      console.log(language);
      console.log(population);*/

      //object destructuring
      let {
        state,
        language,
        population,
        airports: [a1, a2, a3, a4],
      } = obj1;
      console.log(state);
      console.log(language);
      console.log(population);
      console.log(a1);
      console.log(a2);
      console.log(a3);
      console.log(a4);
    </script>
  </body>
</html>
