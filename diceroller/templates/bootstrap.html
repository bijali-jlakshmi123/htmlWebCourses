<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Bootstrap Breakpoints</title>
    <link
      rel="stylesheet"
      href="bootstrap.css
"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container mt-4">
      <div class="row">
        <div class="col-12 col-sm-6 col-lg-4 bg-primary text-white p-3">
          Column 1
        </div>

        <div class="col-12 col-sm-6 col-lg-4 bg-success text-white p-3">
          Column 2
        </div>

        <div class="col-12 col-sm-12 col-lg-4 bg-danger text-white p-3">
          Column 3
        </div>
      </div>
    </div>

    <h1 class="d-none d-md-block text-center mt-4">
      Visible only on tablet and desktop
    </h1>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mt-4">
      <div class="container">
        <a class="navbar-brand p-3" href="#"> MyWebsite </a>

        <div class="navbar-nav p-3">
          <a class="nav-link p-3" href="#">Home</a>
          <a class="nav-link p-3" href="#">About</a>
          <a class="nav-link p-3" href="#">Contact</a>
        </div>
      </div>
    </nav>
    <div class="container-fluid bg-primary text-white">
      Full Width Container
    </div>
    <div class="container bg-success text-white">Boxed Container</div>

    <div class="container bg-danger text-white border border-2">
      <div class="row">
        <div class="col-1 border border-2">1</div>
        <div class="col-1 border border-2">2</div>
        <div class="col-1 border border-2">3</div>
        <div class="col-1 border border-2">4</div>
        <div class="col-1 border border-2">5</div>
        <div class="col-1 border border-2">6</div>
        <div class="col-1 border border-2">7</div>
        <div class="col-1 border border-2">8</div>
        <div class="col-1 border border-2">9</div>
        <div class="col-1 border border-2">10</div>
        <div class="col-1 border border-2">11</div>
        <div class="col-1 border border-2">12</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
