<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #2c3e50;
        font-family: Arial, sans-serif;
        color: white;
      }
      canvas {
        background-color: #000;
        border: 4px solid #fff;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
      }
      #score {
        font-size: 24px;
        margin-bottom: 10px;
      }
      button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 18px;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      button:hover {
        background-color: #2ecc71;
      }
    </style>
  </head>
  <body>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button onclick="startGame()">Start / Restart</button>
    <p>Use Arrow Keys to move</p>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const scoreElement = document.getElementById("score");

      const gridSize = 20;
      const tileCount = canvas.width / gridSize;

      let score = 0;
      let snake = [];
      let food = { x: 15, y: 15 };
      let dx = 1; // Start moving right immediately
      let dy = 0;
      let gameInterval;
      let isGameRunning = false;

      function startGame() {
        // Reset game state
        snake = [{ x: 10, y: 10 }];
        score = 0;
        dx = 1;
        dy = 0;
        scoreElement.innerText = "Score: " + score;
        isGameRunning = true;

        placeFood();

        // Clear any existing loop and start a new one
        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, 100);
      }

      function gameLoop() {
        if (!isGameRunning) return;
        update();
        draw();
      }

      function update() {
        // Calculate new head position
        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // 1. Check Wall Collision
        if (
          head.x < 0 ||
          head.x >= tileCount ||
          head.y < 0 ||
          head.y >= tileCount
        ) {
          endGame();
          return;
        }

        // 2. Check Self Collision
        for (let i = 0; i < snake.length; i++) {
          if (head.x === snake[i].x && head.y === snake[i].y) {
            endGame();
            return;
          }
        }

        // Add new head
        snake.unshift(head);

        // 3. Check Food Collision
        if (head.x === food.x && head.y === food.y) {
          score += 10;
          scoreElement.innerText = "Score: " + score;
          placeFood();
        } else {
          // Remove tail if no food was eaten
          snake.pop();
        }
      }

      function draw() {
        // Clear screen
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Snake
        ctx.fillStyle = "lime";
        for (let i = 0; i < snake.length; i++) {
          ctx.fillRect(
            snake[i].x * gridSize,
            snake[i].y * gridSize,
            gridSize - 2,
            gridSize - 2,
          );
        }

        // Draw Food
        ctx.fillStyle = "red";
        ctx.fillRect(
          food.x * gridSize,
          food.y * gridSize,
          gridSize - 2,
          gridSize - 2,
        );
      }

      function placeFood() {
        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);

        // Make sure food doesn't spawn on the snake
        for (let part of snake) {
          if (part.x === food.x && part.y === food.y) {
            placeFood(); // Try again
            return;
          }
        }
      }

      function endGame() {
        isGameRunning = false;
        clearInterval(gameInterval);

        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over!", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px Arial";
        ctx.fillText(
          "Final Score: " + score,
          canvas.width / 2,
          canvas.height / 2 + 35,
        );
      }

      // Keyboard Controls
      document.addEventListener("keydown", function (event) {
        if (!isGameRunning) return;

        // Prevent arrow keys from scrolling the webpage
        if (
          ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(
            event.code,
          ) > -1
        ) {
          event.preventDefault();
        }

        const goingUp = dy === -1;
        const goingDown = dy === 1;
        const goingRight = dx === 1;
        const goingLeft = dx === -1;

        if (event.key === "ArrowLeft" && !goingRight) {
          dx = -1;
          dy = 0;
        }
        if (event.key === "ArrowUp" && !goingDown) {
          dx = 0;
          dy = -1;
        }
        if (event.key === "ArrowRight" && !goingLeft) {
          dx = 1;
          dy = 0;
        }
        if (event.key === "ArrowDown" && !goingUp) {
          dx = 0;
          dy = 1;
        }
      });

      // Draw initial blank screen
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.font = "20px Arial";
      ctx.textAlign = "center";
      ctx.fillText(
        "Click 'Start / Restart' to play",
        canvas.width / 2,
        canvas.height / 2,
      );
    </script>
  </body>
</html>
