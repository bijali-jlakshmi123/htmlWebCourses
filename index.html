<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        background-color: green;
        color: white;
        padding: 25px;
        text-align: center;
      }
      div:hover {
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <p>Mouse over the div element to see the background color change.</p>
    <div>This is a div element.</div>
  </body>
</html>
